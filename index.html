<style>

    justify-content: center;
    margin: 0 auto 20px;
    position: relative;

  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 0.5px solid rgba(240, 236, 228, 0.07);
    z-index: 2;
    pointer-events: none;
  }

  .avatar-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    border-radius: 50%;
  }

  .name {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #f0ece4;
    margin-bottom: 5px;
  }

  .handle {

    width: 100%;
    padding-left: 2px;
  }

  .links-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 30px;
  }

  .link-card {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(240, 236, 228, 0.03);
    border: 0.5px solid rgba(240, 236, 228, 0.09);
    border-radius: 3px;
    text-decoration: none;
    color: #f0ece4;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .link-card::after {
    content: '';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 0.5px;
    background: rgba(240, 236, 228, 0.18);
    transition: width 0.2s, background 0.2s;
  }

  .link-card:hover {
    background: rgba(240, 236, 228, 0.07);
    border-color: rgba(240, 236, 228, 0.2);
    transform: translateX(4px);
  }

  .link-card:hover::after {
    width: 20px;
    background: rgba(240, 236, 228, 0.45);
  }

  .link-card.highlight {
    background: rgba(240, 236, 228, 0.06);
    border-color: rgba(240, 236, 228, 0.18);
  }

  .link-icon {
    width: 34px;
    height: 34px;
    border-radius: 2px;

  }
